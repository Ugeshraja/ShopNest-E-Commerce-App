<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/admin-base :: html-head('Products Management')}"></head>
<body class="admin-body">

    <div class="admin-wrapper" th:with="pageTitle='Manage Products Catalog'">
        
        <!-- Admin Sidebar -->
        <aside th:replace="~{layout/admin-base :: sidebar}"></aside>

        <!-- Main Content Area -->
        <div class="admin-content-area d-flex flex-column min-vh-100">
            <!-- Top Nav Bar -->
            <header th:replace="~{layout/admin-base :: topbar}"></header>

            <!-- Main Catalog Management Workspace -->
            <main class="admin-main-container p-4 flex-grow-1">
                
                <!-- Feedback Alerts -->
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
                    <i class="fa-solid fa-circle-check me-2"></i>
                    <span th:text="${successMessage}">Success message</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
                    <i class="fa-solid fa-circle-exclamation me-2"></i>
                    <span th:text="${errorMessage}">Error message</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <!-- Products Table Card container -->
                <div class="card rounded-4 border-0 shadow-sm p-4 bg-white">
                    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center border-bottom pb-3 mb-4 gap-3">
                        <h5 class="fw-bold mb-0 text-dark">Catalog Listings</h5>
                        <a th:href="@{/admin/products/add}" class="btn btn-custom py-2 px-3"><i class="fa-solid fa-plus me-2"></i>Add New Product</a>
                    </div>

                    <div class="table-responsive">
                        <table class="table align-middle table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th scope="col">ID</th>
                                    <th scope="col">Image</th>
                                    <th scope="col">Name</th>
                                    <th scope="col">Category</th>
                                    <th scope="col" class="text-end">Price</th>
                                    <th scope="col" class="text-center">Stock</th>
                                    <th scope="col" class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="product : ${products}">
                                    <!-- ID -->
                                    <td class="fw-semibold text-muted" th:text="'#' + ${product.id}">#1</td>
                                    
                                    <!-- Image Thumbnail -->
                                    <td>
                                        <img th:src="${product.imageUrl}" alt="Product Image" class="img-fluid rounded-3 border object-fit-cover" style="width: 50px; height: 50px;">
                                    </td>
                                    
                                    <!-- Name -->
                                    <td class="fw-bold text-dark text-truncate-2" style="max-width: 250px;" th:text="${product.name}">Product Name</td>
                                    
                                    <!-- Category Badge -->
                                    <td>
                                        <span class="badge bg-light text-dark border px-2 py-1.5 fs-xxs" th:text="${product.category.name}">Category</span>
                                    </td>
                                    
                                    <!-- Price -->
                                    <td class="text-end fw-bold text-dark" th:text="'₹' + ${#numbers.formatDecimal(product.price, 1, 2)}">$0.00</td>
                                    
                                    <!-- Stock Level status indicator -->
                                    <td class="text-center">
                                        <span class="badge px-2.5 py-1.5 rounded-pill fs-xxs fw-medium"
                                              th:text="${product.stock}"
                                              th:classappend="${product.stock == 0 ? 'bg-danger text-white' : 
                                                              (product.stock < 10 ? 'bg-warning text-dark' : 'bg-success text-white')}">
                                            0
                                        </span>
                                    </td>
                                    
                                    <!-- Action Buttons -->
                                    <td class="text-center">
                                        <div class="d-inline-flex gap-2">
                                            <a th:href="@{/admin/products/edit/{id}(id=${product.id})}" class="btn btn-sm btn-outline-primary border-0 p-2" title="Edit Product">
                                                <i class="fa-solid fa-pen-to-square"></i>
                                            </a>
                                            <!-- Delete Product Anchor (triggers browser-native confirm in JS) -->
                                            <a th:href="@{/admin/products/delete/{id}(id=${product.id})}" 
                                               class="btn btn-sm btn-outline-danger border-0 p-2" 
                                               th:data-confirm-delete="'Are you sure you want to delete ' + ${product.name} + '?'"
                                               onclick="return confirm(this.getAttribute('data-confirm-delete'))"
                                               title="Delete Product">
                                                <i class="fa-solid fa-trash-can"></i>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                                
                                <tr th:if="${products.isEmpty()}">
                                    <td colspan="7" class="text-center py-5 text-muted">
                                        <i class="fa-solid fa-box-open fs-2 mb-2 d-block"></i>
                                        <span>No products available in the database. Click "Add New Product" to register one.</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Script imports -->
    <div th:replace="~{layout/admin-base :: scripts}"></div>
</body>
</html>
