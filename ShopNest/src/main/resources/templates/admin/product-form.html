<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/admin-base :: html-head(${isEdit} ? 'Edit Product' : 'Add Product')}"></head>
<body class="admin-body">

    <div class="admin-wrapper" th:with="pageTitle=${isEdit} ? 'Update Catalog Product' : 'Register New Product'">
        
        <!-- Admin Sidebar -->
        <aside th:replace="~{layout/admin-base :: sidebar}"></aside>

        <!-- Main Content Area -->
        <div class="admin-content-area d-flex flex-column min-vh-100">
            <!-- Top Nav Bar -->
            <header th:replace="~{layout/admin-base :: topbar}"></header>

            <!-- Main Form Workspace -->
            <main class="admin-main-container p-4 flex-grow-1">
                
                <!-- Back Link -->
                <div class="mb-4">
                    <a th:href="@{/admin/products}" class="text-accent text-decoration-none fw-semibold">
                        <i class="fa-solid fa-arrow-left me-2"></i>Back to Products List
                    </a>
                </div>

                <div class="row">
                    <div class="col-lg-8 col-xl-7">
                        
                        <!-- Form Card Container -->
                        <div class="card rounded-4 border-0 shadow-sm p-4 p-md-5 bg-white">
                            <h5 class="fw-bold mb-4 text-dark border-bottom pb-3" th:text="${isEdit} ? 'Edit Product Details' : 'New Product Details'">Details</h5>

                            <form th:action="@{/admin/products/save}" th:object="${product}" method="post">
                                <!-- Hidden product ID for updates -->
                                <input type="hidden" th:field="*{id}">

                                <!-- Product Name -->
                                <div class="mb-3">
                                    <label for="name" class="form-label fw-semibold">Product Name</label>
                                    <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="e.g. Premium Wireless Headphones" required>
                                </div>

                                <!-- Category Dropdown Selection -->
                                <div class="mb-3">
                                    <label for="categorySelect" class="form-label fw-semibold">Category</label>
                                    <!-- Use name="categoryId" matching Controller @RequestParam -->
                                    <select id="categorySelect" name="categoryId" class="form-select bg-white" required>
                                        <option value="" disabled selected>-- Choose Category --</option>
                                        <option th:each="cat : ${categories}" 
                                                th:value="${cat.id}" 
                                                th:text="${cat.name}"
                                                th:selected="${product.category != null && product.category.id == cat.id}">Category Name</option>
                                    </select>
                                </div>

                                <!-- Pricing & Stock Grid -->
                                <div class="row g-3 mb-3">
                                    <div class="col-sm-6">
                                        <label for="price" class="form-label fw-semibold">Price (₹)</label>
                                        <div class="input-group">
                                            <span class="input-group-text">₹</span>
                                            <input type="number" id="price" th:field="*{price}" step="0.01" min="0.01" class="form-control" placeholder="0.00" required>
                                        </div>
                                    </div>
                                    <div class="col-sm-6">
                                        <label for="stock" class="form-label fw-semibold">Available Stock</label>
                                        <input type="number" id="stock" th:field="*{stock}" min="0" class="form-control" placeholder="e.g. 50" required>
                                    </div>
                                </div>

                                <!-- Product Description -->
                                <div class="mb-3">
                                    <label for="description" class="form-label fw-semibold">Description</label>
                                    <textarea id="description" th:field="*{description}" rows="5" class="form-control" placeholder="Enter high-converting product descriptions..." required></textarea>
                                </div>

                                <!-- Image URL with live preview option -->
                                <div class="mb-4">
                                    <label for="imageUrl" class="form-label fw-semibold">Image URL</label>
                                    <input type="url" id="imageUrl" th:field="*{imageUrl}" class="form-control" placeholder="https://example.com/image.jpg" oninput="updateImagePreview(this.value)">
                                    <small class="text-muted mt-1 d-block">Provide a direct web link to the product photo. Unsplash, Imgur or self-hosted URLs are accepted.</small>
                                    
                                    <!-- Live Preview Wrapper -->
                                    <div class="mt-3 p-2 border rounded-3 bg-light text-center" style="max-width: 200px;">
                                        <span class="text-muted d-block fs-xs mb-2">Live Preview</span>
                                        <img id="previewImg" th:src="${product.imageUrl != null && !product.imageUrl.isEmpty() ? product.imageUrl : 'https://placehold.co/150'}" alt="Live Preview" class="img-fluid rounded-2 object-fit-contain" style="height: 120px;">
                                    </div>
                                </div>

                                <button class="btn btn-custom w-100 py-3 mt-2" type="submit">
                                    <i class="fa-solid fa-floppy-disk me-2"></i>Save Product Catalog Record
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Script imports -->
    <div th:replace="~{layout/admin-base :: scripts}"></div>

    <!-- Client side script for instant Image preview updates -->
    <script>
        function updateImagePreview(url) {
            var img = document.getElementById('previewImg');
            if (url && url.trim() !== '') {
                img.src = url;
            } else {
                img.src = 'https://placehold.co/150';
            }
        }
    </script>
</body>
</html>
