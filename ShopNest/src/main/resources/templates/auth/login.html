<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: html-head('Login')}"></head>
<body class="auth-bg d-flex align-items-center min-vh-100 py-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <!-- Auth Card Container -->
                <div class="auth-card p-4 p-md-5 shadow-lg rounded-4">
                    
                    <div class="text-center mb-4">
                        <a class="navbar-brand d-inline-flex align-items-center mb-3 text-dark" th:href="@{/}">
                            <i class="fa-solid fa-feather-pointed brand-icon me-2"></i>
                            <span class="fs-2 fw-bold">Shop<span class="brand-accent">Nest</span></span>
                        </a>
                        <h4 class="fw-semibold text-dark">Welcome Back</h4>
                        <p class="text-muted">Sign in to continue your shopping journey</p>
                    </div>

                    <!-- Flash messages for registration success -->
                    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <i class="fa-solid fa-circle-check me-2"></i>
                        <span th:text="${successMessage}">Success!</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <!-- Flash messages for logout -->
                    <div th:if="${param.logout}" class="alert alert-info alert-dismissible fade show" role="alert">
                        <i class="fa-solid fa-circle-info me-2"></i>
                        <span>You have been logged out successfully.</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <!-- Error messages for login failure -->
                    <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fa-solid fa-triangle-exclamation me-2"></i>
                        <span>Invalid email or password. Please try again.</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <!-- Login Form -->
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                                <input type="email" class="form-control" id="email" name="email" required placeholder="name@example.com">
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="d-flex justify-content-between mb-1">
                                <label for="password" class="form-label mb-0">Password</label>
                                <a href="#" class="fs-xs text-accent text-decoration-none">Forgot Password?</a>
                            </div>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                                <input type="password" class="form-control" id="password" name="password" required placeholder="••••••••">
                            </div>
                        </div>

                        <button class="btn btn-custom w-100 py-2.5 mb-3" type="submit">Sign In</button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-0 text-muted">Don't have an account? <a th:href="@{/register}" class="text-accent text-decoration-none fw-medium">Create one now</a></p>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Script imports -->
    <div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
